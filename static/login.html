<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 370px;
            margin: 0 auto;
            background: #fff;
            padding: 32px 20px 28px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 2rem;
            color: #007bff;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 12px;
            margin: 10px 0 18px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        .error {
            color: #d00;
            text-align: center;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 24px 8px 18px 8px;
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }
            h2 {
                font-size: 1.4rem;
            }
            input[type="text"], input[type="password"] {
                padding: 12px 8px;
                font-size: 0.98rem;
            }
            button {
                padding: 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>{{ nome_fantasia }}<br><span style="font-size:1rem;font-weight:400;color:#555">CNPJ: {{ cnpj }}</span></h2>
        <h3 style="text-align:center;margin-bottom:18px;font-size:1.1rem;color:#007bff;font-weight:500;">Login</h3>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Usuário" required autofocus>
            <input type="password" name="password" placeholder="Senha" required>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
