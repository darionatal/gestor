<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>{% block title %}Gestor{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.12);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.12);
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.35);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: calc(64px + var(--safe-bottom));
            overscroll-behavior-y: contain;
        }

        /* ─── Top Bar (compact for mobile) ─── */
        .topbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--accent);
            text-decoration: none;
        }

        .topbar-brand .material-icons-round { font-size: 24px; }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-user-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 500;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-user-badge .material-icons-round {
            font-size: 18px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .btn-logout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-logout:active {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-logout .material-icons-round { font-size: 20px; }

        /* ─── Bottom Navigation ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(64px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: stretch;
            z-index: 100;
        }

        .bottom-nav a {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .bottom-nav a .material-icons-round {
            font-size: 24px;
            transition: color 0.2s;
        }

        .bottom-nav a.active {
            color: var(--accent);
        }

        .bottom-nav a.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 3px;
            background: var(--accent);
            border-radius: 0 0 3px 3px;
        }

        /* ─── Main Content ─── */
        .main-content {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ─── Page Header ─── */
        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* ─── Breadcrumb / Back ─── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding: 6px 0;
            min-height: 44px;
        }

        .back-link .material-icons-round { font-size: 20px; }

        /* ─── Cards ─── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
        }

        /* ─── Summary Row (horizontal scroll on mobile) ─── */
        .summary-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .summary-row::-webkit-scrollbar { display: none; }

        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            min-width: 160px;
            flex-shrink: 0;
            scroll-snap-align: start;
            box-shadow: var(--shadow);
        }

        .summary-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .summary-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
        .summary-icon.green { background: var(--success-bg); color: var(--success); }
        .summary-icon.amber { background: var(--warning-bg); color: var(--warning); }

        .summary-icon .material-icons-round { font-size: 22px; }

        .summary-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }

        .summary-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .summary-value.green { color: var(--success); }
        .summary-value.amber { color: var(--warning); }

        /* ─── Mobile Card-List (replaces tables on small screens) ─── */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-list-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: var(--radius-sm);
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .card-list-item-info {
            flex: 1;
            min-width: 0;
        }

        .card-list-item-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-list-item-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-list-item-value {
            font-size: 1.05rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        .card-list-item-value.green { color: var(--success); }
        .card-list-item-value.amber { color: var(--warning); }

        /* ─── Badges ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .badge-success { background: var(--success-bg); color: var(--success); }
        .badge-warning { background: var(--warning-bg); color: var(--warning); }

        /* ─── Section Title ─── */
        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .material-icons-round {
            font-size: 20px;
            color: var(--accent);
        }

        /* ─── Total Footer ─── */
        .card-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            margin-top: 10px;
            border-top: 2px solid var(--border);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .card-total-value.green { color: var(--success); }
        .card-total-value.amber { color: var(--warning); }

        /* ─── Empty State ─── */
        .empty-state {
            text-align: center;
            padding: 36px 16px;
            color: var(--text-muted);
        }

        .empty-state .material-icons-round {
            font-size: 40px;
            margin-bottom: 8px;
            opacity: 0.35;
        }

        .empty-state p { font-size: 0.88rem; }

        /* ─── Animations ─── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.35s ease-out both;
        }

        .animate-in:nth-child(2) { animation-delay: 0.05s; }
        .animate-in:nth-child(3) { animation-delay: 0.1s; }
        .animate-in:nth-child(4) { animation-delay: 0.15s; }
        .animate-in:nth-child(5) { animation-delay: 0.2s; }

        /* ─── Desktop enhancements ─── */
        @media (min-width: 768px) {
            .main-content { padding: 28px 24px; max-width: 700px; }
            .topbar { padding: 0 24px; height: 56px; }
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
            .page-header h1 { font-size: 1.6rem; }

            .summary-row {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                overflow: visible;
            }

            .summary-card { min-width: auto; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="topbar">
        <a href="{{ url_for('dashboard') }}" class="topbar-brand">
            <span class="material-icons-round">dashboard</span>
            Gestor
        </a>
        <div class="topbar-right">
            <div class="topbar-user-badge">
                <span class="material-icons-round">person</span>
                <span>{{ session.get('username', '') }}</span>
            </div>
            <a href="{{ url_for('logout') }}" class="btn-logout" title="Sair">
                <span class="material-icons-round">logout</span>
            </a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
            <span class="material-icons-round">home</span>
            Início
        </a>
        <a href="{{ url_for('faturamento_dia') }}" class="{% if request.endpoint == 'faturamento_dia' %}active{% endif %}">
            <span class="material-icons-round">today</span>
            Dia
        </a>
        <a href="{{ url_for('faturamento_mes') }}" class="{% if request.endpoint == 'faturamento_mes' %}active{% endif %}">
            <span class="material-icons-round">calendar_month</span>
            Mês
        </a>
        <a href="{{ url_for('comissao') }}" class="{% if request.endpoint == 'comissao' %}active{% endif %}">
            <span class="material-icons-round">payments</span>
            Comissão
        </a>
    </nav>

    {% block extra_js %}{% endblock %}
</body>
</html>
